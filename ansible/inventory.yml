all:
  children:
    control:
      hosts:
        fx-control:
          ansible_host: 10.10.1.81
          ansible_user: fx-control
          ansible_password: "{{ lookup('env', 'LINUX_STANDARD_SSH_PASSWORD') }}"
          ansible_become_password: "{{ lookup('env', 'LINUX_STANDARD_SUDO_PASSWORD') }}"
    llm_reason:
      hosts:
        fx-llm-local-reason:
          ansible_host: 10.10.1.82
          ansible_user: fx-llm-local-reason
          ansible_password: "{{ lookup('env', 'LINUX_STANDARD_SSH_PASSWORD') }}"
          ansible_become_password: "{{ lookup('env', 'LINUX_STANDARD_SUDO_PASSWORD') }}"
    llm_code:
      hosts:
        fx-llm-local-code:
          ansible_host: 10.10.1.83
          ansible_user: fx-llm-local-code
          ansible_password: "{{ lookup('env', 'LINUX_STANDARD_SSH_PASSWORD') }}"
          ansible_become_password: "{{ lookup('env', 'LINUX_STANDARD_SUDO_PASSWORD') }}"
    market_worker:
      hosts:
        fx-market-worker:
          ansible_host: 10.10.1.84
          ansible_user: fx-market-worker
          ansible_password: "{{ lookup('env', 'LINUX_STANDARD_SSH_PASSWORD') }}"
          ansible_become_password: "{{ lookup('env', 'LINUX_STANDARD_SUDO_PASSWORD') }}"
    strategy_risk_worker:
      hosts:
        fx-strategy-risk-worker:
          ansible_host: 10.10.1.85
          ansible_user: fx-strategy-risk-worker
          ansible_password: "{{ lookup('env', 'LINUX_STANDARD_SSH_PASSWORD') }}"
          ansible_become_password: "{{ lookup('env', 'LINUX_STANDARD_SUDO_PASSWORD') }}"
    mt5_bridge_windows:
      hosts:
        fx-mt5-bridge:
          ansible_host: 10.10.1.86
          ansible_user: "{{ lookup('env', 'WINDOWS_MT5_USER') }}"
          ansible_password: "{{ lookup('env', 'WINDOWS_MT5_PASSWORD') }}"
          ansible_connection: winrm
          ansible_winrm_transport: ntlm
          ansible_winrm_server_cert_validation: ignore
    llm_nodes:
      children:
        llm_reason:
        llm_code:
    worker_nodes:
      children:
        market_worker:
        strategy_risk_worker:
    linux_nodes:
      children:
        control:
        llm_nodes:
        worker_nodes:
    all_ai_nodes:
      children:
        linux_nodes:
