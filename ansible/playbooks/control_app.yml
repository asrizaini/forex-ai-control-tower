---
- name: Deploy control API and dashboard
  hosts: control
  become: true
  tasks:
    - name: Create application source directory
      ansible.builtin.file:
        path: /opt/forex-ai-control-tower/app
        state: directory
        owner: aiops
        group: aiops
        mode: "0750"

    - name: Copy control package marker
      ansible.builtin.copy:
        src: ../../control/__init__.py
        dest: /opt/forex-ai-control-tower/app/control/__init__.py
        owner: aiops
        group: aiops
        mode: "0644"

    - name: Copy control API package
      ansible.builtin.copy:
        src: ../../control/api/
        dest: /opt/forex-ai-control-tower/app/control/api/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy control API requirements
      ansible.builtin.copy:
        src: ../../control/requirements.txt
        dest: /opt/forex-ai-control-tower/app/control/requirements.txt
        owner: aiops
        group: aiops
        mode: "0644"

    - name: Copy agents package
      ansible.builtin.copy:
        src: ../../agents/
        dest: /opt/forex-ai-control-tower/app/agents/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy Agent Theater package
      ansible.builtin.copy:
        src: ../../agent_theater/
        dest: /opt/forex-ai-control-tower/app/agent_theater/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy Execution Guard package
      ansible.builtin.copy:
        src: ../../execution_guard/
        dest: /opt/forex-ai-control-tower/app/execution_guard/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy risk package
      ansible.builtin.copy:
        src: ../../risk/
        dest: /opt/forex-ai-control-tower/app/risk/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy strategies package
      ansible.builtin.copy:
        src: ../../strategies/
        dest: /opt/forex-ai-control-tower/app/strategies/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy governance package
      ansible.builtin.copy:
        src: ../../governance/
        dest: /opt/forex-ai-control-tower/app/governance/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy market data quality package
      ansible.builtin.copy:
        src: ../../market_data_quality/
        dest: /opt/forex-ai-control-tower/app/market_data_quality/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy broker compatibility package
      ansible.builtin.copy:
        src: ../../broker_compatibility/
        dest: /opt/forex-ai-control-tower/app/broker_compatibility/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy notifications package
      ansible.builtin.copy:
        src: ../../notifications/
        dest: /opt/forex-ai-control-tower/app/notifications/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy LLM cost center package
      ansible.builtin.copy:
        src: ../../llm_cost_center/
        dest: /opt/forex-ai-control-tower/app/llm_cost_center/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy model evaluation package
      ansible.builtin.copy:
        src: ../../model_evaluation/
        dest: /opt/forex-ai-control-tower/app/model_evaluation/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy OpenClaw gateway package
      ansible.builtin.copy:
        src: ../../openclaw_gateway/
        dest: /opt/forex-ai-control-tower/app/openclaw_gateway/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy localization package
      ansible.builtin.copy:
        src: ../../localization/
        dest: /opt/forex-ai-control-tower/app/localization/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy news feed package
      ansible.builtin.copy:
        src: ../../news_feed/
        dest: /opt/forex-ai-control-tower/app/news_feed/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy locale files
      ansible.builtin.copy:
        src: ../../locales/
        dest: /opt/forex-ai-control-tower/app/locales/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Create runtime state directory
      ansible.builtin.file:
        path: /opt/forex-ai-control-tower/runtime
        state: directory
        owner: aiops
        group: aiops
        mode: "0750"

    - name: Create protected control tower config directory
      ansible.builtin.file:
        path: /etc/forex-ai-control-tower
        state: directory
        owner: root
        group: aiops
        mode: "0750"

    - name: Create persistent credential store encryption key if missing
      ansible.builtin.shell: |
        set -euo pipefail
        if [ ! -s /etc/forex-ai-control-tower/credential_store.key ]; then
          python3 - <<'PY'
        import base64, os
        print(base64.urlsafe_b64encode(os.urandom(32)).decode())
        PY
        fi
      args:
        executable: /bin/bash
        creates: /etc/forex-ai-control-tower/credential_store.key
      register: credential_store_key
      no_log: true

    - name: Install credential store key
      ansible.builtin.copy:
        dest: /etc/forex-ai-control-tower/credential_store.key
        content: "{{ credential_store_key.stdout }}\n"
        owner: root
        group: aiops
        mode: "0640"
      when: credential_store_key.stdout is defined and credential_store_key.stdout | length > 0
      no_log: true

    - name: Add PHP PPA and install PHP
      ansible.builtin.shell: |
        set -euo pipefail
        if ! command -v php &>/dev/null; then
          apt-get update -qq
          apt-get install -y software-properties-common
          add-apt-repository -y ppa:ondrej/php 2>/dev/null || true
          apt-get update -qq
          apt-get install -y php-cli php-mbstring php-xml php-curl php-zip php-sqlite3 composer
        fi
        php -v | head -1
      args:
        executable: /bin/bash
      register: php_install
      changed_when: "'PHP' in php_install.stdout"

    - name: Create Laravel dashboard directory
      ansible.builtin.file:
        path: /opt/forex-ai-control-tower/dashboard-laravel
        state: directory
        owner: aiops
        group: aiops
        mode: "0755"

    - name: Copy Laravel dashboard application (excluding vendor)
      ansible.builtin.synchronize:
        src: ../../control/dashboard-laravel/
        dest: /opt/forex-ai-control-tower/dashboard-laravel/
        owner: no
        group: no
        rsync_opts:
          - "--exclude=vendor"
          - "--exclude=node_modules"
          - "--exclude=.env"

    - name: Install Laravel Composer dependencies
      community.general.composer:
        command: install
        working_dir: /opt/forex-ai-control-tower/dashboard-laravel
        no_dev: true
        prefer_dist: true
      become_user: aiops
      environment:
        COMPOSER_ALLOW_SUPERUSER: "1"
      ignore_errors: true

    - name: Set Laravel dashboard environment
      ansible.builtin.copy:
        dest: /opt/forex-ai-control-tower/dashboard-laravel/.env
        owner: aiops
        group: aiops
        mode: "0640"
        content: |
          APP_NAME="Forex AI Control Tower"
          APP_ENV=production
          APP_KEY=
          APP_DEBUG=false
          APP_URL=http://10.10.1.81:5173
          APP_LOCALE=en
          APP_FALLBACK_LOCALE=en
          LOG_CHANNEL=stderr
          LOG_LEVEL=warning
          DB_CONNECTION=sqlite
          SESSION_DRIVER=file
          SESSION_LIFETIME=120
          CACHE_STORE=file
          QUEUE_CONNECTION=sync
          CONTROL_TOWER_API_URL=http://10.10.1.81:8000
          CONTROL_TOWER_DOCS_URL=http://10.10.1.81:8000/docs
          CONTROL_TOWER_GRAFANA_URL=http://10.10.1.81:3000

    - name: Generate Laravel application key
      ansible.builtin.shell: |
        cd /opt/forex-ai-control-tower/dashboard-laravel
        if grep -q 'APP_KEY=$' .env || ! grep -q 'APP_KEY=base64' .env; then
          php artisan key:generate --force 2>/dev/null || echo "key:generate skipped"
        fi
      become_user: aiops
      ignore_errors: true

    - name: Set Laravel directory permissions
      ansible.builtin.file:
        path: "{{ item }}"
        owner: aiops
        group: aiops
        recurse: true
        mode: "ug+rwx,o+rx"
      loop:
        - /opt/forex-ai-control-tower/dashboard-laravel/storage
        - /opt/forex-ai-control-tower/dashboard-laravel/bootstrap/cache

    - name: Create Python virtual environment
      ansible.builtin.command:
        cmd: python3 -m venv /opt/forex-ai-control-tower/.venv
        creates: /opt/forex-ai-control-tower/.venv/bin/python

    - name: Install control API requirements
      ansible.builtin.pip:
        requirements: /opt/forex-ai-control-tower/app/control/requirements.txt
        virtualenv: /opt/forex-ai-control-tower/.venv

    - name: Install control API systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/forex-control-api.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Forex AI Control Tower API
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=aiops
          Group=aiops
          WorkingDirectory=/opt/forex-ai-control-tower/app
          EnvironmentFile=-/etc/forex-ai-control-tower/runtime.env
          Environment=PYTHONPATH=/opt/forex-ai-control-tower/app
          Environment=AGENT_THEATER_EVENT_LOG=/opt/forex-ai-control-tower/runtime/agent_theater_events.jsonl
          Environment=LOKI_PUSH_URL=http://10.10.1.81:3100/loki/api/v1/push
          Environment=AGENT_THEATER_INTERNAL_WS=true
          Environment=ORCHESTRATOR_CHAT_INTERNAL_MODE=true
          Environment=ORCHESTRATOR_GENERAL_CHAT_MODE=ollama
          Environment=OLLAMA_REASON_URL=http://10.10.1.82:11434
          Environment=ORCHESTRATOR_GENERAL_CHAT_MODEL=llama3.1:8b
          PassEnvironment=JWT_SECRET_KEY POSTGRES_PASSWORD GRAFANA_ADMIN_PASSWORD EXECUTION_GUARD_SIGNING_KEY BRIDGE_API_TOKEN LOCAL_AUTH_BOOTSTRAP_ENABLED LOCAL_ADMIN_BOOTSTRAP_PASSWORD TOTP_ISSUER ALLOW_LIVE_TRADING
          PassEnvironment=NEWS_PROVIDER_ENABLED NEWS_PROVIDER_TYPE NEWS_CALENDAR_FILE NEWS_CALENDAR_URL NEWS_PROVIDER_API_KEY NEWS_HIGH_IMPACT_WINDOW_MINUTES NEWS_STALE_AFTER_MINUTES NEWS_CALENDAR_FROM NEWS_CALENDAR_TO
          PassEnvironment=TELEGRAM_BOT_TOKEN TELEGRAM_ADMIN_CHAT_ID WHATSAPP_TOKEN WHATSAPP_PHONE_NUMBER_ID SMTP_HOST SMTP_PORT SMTP_USER SMTP_PASSWORD SMTP_FROM FCM_PROJECT_ID FCM_SERVER_KEY FCM_SERVICE_ACCOUNT_JSON VAPID_PUBLIC_KEY VAPID_PRIVATE_KEY DISCORD_WEBHOOK_URL SMS_PROVIDER_TOKEN ALERTMANAGER_WEBHOOK_TOKEN
          PassEnvironment=OPENAI_API_KEY GEMINI_API_KEY LLM_DAILY_BUDGET_USD LLM_MONTHLY_BUDGET_USD PAID_LLM_APPROVAL_REQUIRED OPENCLAW_ENABLED OPENCLAW_API_URL OPENCLAW_API_TOKEN RECOVERY_EMAIL
          ExecStart=/opt/forex-ai-control-tower/.venv/bin/python -m uvicorn control.api.main:app --host 0.0.0.0 --port 8000
          Restart=always
          RestartSec=5
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target

    - name: Install orchestrator runtime systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/forex-orchestrator.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Forex AI Control Tower Orchestrator Runtime
          After=network-online.target forex-control-stack.service forex-control-api.service
          Wants=network-online.target

          [Service]
          Type=simple
          User=aiops
          Group=aiops
          WorkingDirectory=/opt/forex-ai-control-tower/app
          EnvironmentFile=-/etc/forex-ai-control-tower/runtime.env
          Environment=PYTHONPATH=/opt/forex-ai-control-tower/app
          Environment=AGENT_THEATER_EVENT_LOG=/opt/forex-ai-control-tower/runtime/agent_theater_events.jsonl
          Environment=LOKI_PUSH_URL=http://10.10.1.81:3100/loki/api/v1/push
          Environment=ORCHESTRATOR_INTERVAL_SECONDS=30
          ExecStart=/opt/forex-ai-control-tower/.venv/bin/python -m agents.orchestrator_runtime
          Restart=always
          RestartSec=5
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target

    - name: Install agent workflow engine systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/forex-agent-workflow.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Forex AI Control Tower Agent Workflow Engine
          After=network-online.target forex-control-stack.service forex-control-api.service
          Wants=network-online.target

          [Service]
          Type=simple
          User=aiops
          Group=aiops
          WorkingDirectory=/opt/forex-ai-control-tower/app
          EnvironmentFile=-/etc/forex-ai-control-tower/runtime.env
          Environment=PYTHONPATH=/opt/forex-ai-control-tower/app
          Environment=AGENT_THEATER_EVENT_LOG=/opt/forex-ai-control-tower/runtime/agent_theater_events.jsonl
          Environment=LOKI_PUSH_URL=http://10.10.1.81:3100/loki/api/v1/push
          Environment=AGENT_WORKFLOW_INTERVAL_SECONDS=5
          PassEnvironment=POSTGRES_PASSWORD
          ExecStart=/opt/forex-ai-control-tower/.venv/bin/python -m agents.workflow_engine
          Restart=always
          RestartSec=5
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target

    - name: Install OpenClaw runtime systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/forex-openclaw-runtime.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Forex AI OpenClaw Runtime Adapter
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=aiops
          Group=aiops
          WorkingDirectory=/opt/forex-ai-control-tower/app
          EnvironmentFile=-/etc/forex-ai-control-tower/runtime.env
          Environment=PYTHONPATH=/opt/forex-ai-control-tower/app
          Environment=OPENCLAW_RUNTIME_HOST=0.0.0.0
          Environment=OPENCLAW_RUNTIME_PORT=8600
          PassEnvironment=OPENCLAW_API_TOKEN OPENCLAW_RUNTIME_HOST OPENCLAW_RUNTIME_PORT
          ExecStart=/opt/forex-ai-control-tower/.venv/bin/python -m openclaw_gateway.runtime_server
          Restart=always
          RestartSec=5
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target

    - name: Install dashboard systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/forex-dashboard.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Forex AI Control Tower Dashboard (Laravel)
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=aiops
          Group=aiops
          WorkingDirectory=/opt/forex-ai-control-tower/dashboard-laravel
          ExecStart=/usr/bin/php artisan serve --host=0.0.0.0 --port=5173
          Environment=PHP_CLI_SERVER_WORKERS=4
          Restart=always
          RestartSec=5
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Start and enable control API
      ansible.builtin.systemd_service:
        name: forex-control-api
        state: restarted
        enabled: true

    - name: Start and enable Laravel dashboard
      ansible.builtin.systemd_service:
        name: forex-dashboard
        state: restarted
        enabled: true

    - name: Start and enable orchestrator runtime
      ansible.builtin.systemd_service:
        name: forex-orchestrator
        state: restarted
        enabled: true

    - name: Start and enable agent workflow engine
      ansible.builtin.systemd_service:
        name: forex-agent-workflow
        state: restarted
        enabled: true

    - name: Start and enable OpenClaw runtime adapter
      ansible.builtin.systemd_service:
        name: forex-openclaw-runtime
        state: restarted
        enabled: true
