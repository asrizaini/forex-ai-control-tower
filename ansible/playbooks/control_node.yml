---
- name: Phase 4 - Control node services
  hosts: control
  become: true
  tasks:
    - name: Create application directory
      ansible.builtin.file:
        path: /opt/forex-ai-control-tower
        state: directory
        owner: aiops
        group: aiops
        mode: "0755"

    - name: Copy control Docker Compose file
      ansible.builtin.copy:
        src: ../../docker/control-stack.compose.yml
        dest: /opt/forex-ai-control-tower/control-stack.compose.yml
        owner: aiops
        group: aiops
        mode: "0640"

    - name: Create monitoring config directory
      ansible.builtin.file:
        path: /opt/forex-ai-control-tower/monitoring
        state: directory
        owner: aiops
        group: aiops
        mode: "0755"

    - name: Copy Prometheus config
      ansible.builtin.copy:
        src: ../../monitoring/prometheus.yml
        dest: /opt/forex-ai-control-tower/monitoring/prometheus.yml
        owner: aiops
        group: aiops
        mode: "0644"

    - name: Copy Blackbox exporter config
      ansible.builtin.copy:
        src: ../../monitoring/blackbox.yml
        dest: /opt/forex-ai-control-tower/monitoring/blackbox.yml
        owner: aiops
        group: aiops
        mode: "0644"

    - name: Copy Grafana provisioning and dashboards
      ansible.builtin.copy:
        src: ../../monitoring/grafana/
        dest: /opt/forex-ai-control-tower/monitoring/grafana/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Validate control stack compose file
      ansible.builtin.command:
        cmd: docker compose -f /opt/forex-ai-control-tower/control-stack.compose.yml config
      environment:
        POSTGRES_PASSWORD: compose-validation-value
        GRAFANA_ADMIN_PASSWORD: compose-validation-value
      changed_when: false
