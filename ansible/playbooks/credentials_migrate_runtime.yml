- name: Migrate runtime credentials into encrypted DB store
  hosts: control
  become: true
  gather_facts: false
  tasks:
    - name: Trigger runtime-to-DB credential migration
      shell: |
        set -eu
        if [ ! -f /etc/forex-ai-control-tower/runtime.env ]; then
          echo "runtime_env_missing"
          exit 1
        fi
        . /etc/forex-ai-control-tower/runtime.env

        if [ -z "${LOCAL_ADMIN_BOOTSTRAP_PASSWORD:-}" ]; then
          PYTHONPATH=/opt/forex-ai-control-tower/app /opt/forex-ai-control-tower/.venv/bin/python -c "from control.api.db import SessionLocal; from control.api.credential_store import migrate_runtime_credentials; db=SessionLocal(); migrated=migrate_runtime_credentials(db,'ansible_runtime_migrate'); db.commit(); db.close(); print('migrated_count='+str(len(migrated))); print('migrated_names='+','.join(migrated))"
          exit 0
        fi

        LOGIN_BODY=$(python3 -c "import json,os; print(json.dumps({'user_id':'admin','password':os.environ.get('LOCAL_ADMIN_BOOTSTRAP_PASSWORD','')}))")
        TOKEN=$(curl -sS -X POST http://127.0.0.1:8000/api/v1/auth/login -H "Content-Type: application/json" -d "${LOGIN_BODY}" | python3 -c "import json,sys; print((json.load(sys.stdin) or {}).get('access_token',''))")
        if [ -z "${TOKEN}" ]; then
          echo "login_failed"
          exit 3
        fi

        MIGRATION=$(curl -sS -X POST http://127.0.0.1:8000/api/v1/credentials/migrate-runtime -H "Authorization: Bearer ${TOKEN}" -H "Content-Type: application/json")
        python3 -c "import json,sys; body=json.loads(sys.stdin.read() or '{}'); print('migrated_count='+str(int(body.get('migrated_count',0)))); print('migrated_names='+','.join(body.get('migrated_names') or []))" <<< "${MIGRATION}"
      register: migrate_result
      changed_when: false

    - name: Show migration summary
      debug:
        var: migrate_result.stdout_lines
