---
- name: Relax demo account risk policy for performance validation
  hosts: control
  become: true
  tasks:
    - name: Update demo_main risk policy caps
      ansible.builtin.shell: |
        set -euo pipefail
        export POSTGRES_PASSWORD="$(systemctl show-environment | sed -n 's/^POSTGRES_PASSWORD=//p')"
        cd /opt/forex-ai-control-tower/app
        /opt/forex-ai-control-tower/.venv/bin/python - <<'PY'
        from sqlalchemy import select
        from control.api.db import SessionLocal
        from control.api.models import RiskPolicy

        db = SessionLocal()
        try:
            rows = list(db.scalars(select(RiskPolicy).where(RiskPolicy.scope == "account", RiskPolicy.account_id == "demo_main")))
            if not rows:
                row = RiskPolicy(scope="account", account_id="demo_main", strategy_id=None)
                db.add(row)
                rows = [row]
            for row in rows:
                row.max_daily_loss_pct = 5.0
                row.max_weekly_loss_pct = 15.0
                row.max_open_trades = 20
                row.max_trades_per_day = 200
                row.max_spread_points = 60.0
                row.auto_execution_enabled = True
                metadata = row.metadata_json or {}
                metadata["max_slippage_points"] = 120
                row.metadata_json = metadata
            db.commit()
            print(f"updated_policies={len(rows)}")
        finally:
            db.close()
        PY
      args:
        executable: /bin/bash
      changed_when: true
