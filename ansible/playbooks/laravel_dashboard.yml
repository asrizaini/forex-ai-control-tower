---
- name: Deploy optional Laravel operator dashboard
  hosts: control
  become: true
  tasks:
    - name: Stop and disable legacy React dashboard service
      ansible.builtin.systemd_service:
        name: forex-dashboard
        state: stopped
        enabled: false
      failed_when: false

    - name: Install PHP and Composer packages for Laravel dashboard
      ansible.builtin.apt:
        name:
          - php-cli
          - php-curl
          - php-mbstring
          - php-xml
          - php-zip
          - php-sqlite3
          - unzip
          - composer
        state: present
        update_cache: false

    - name: Create Laravel dashboard directory
      ansible.builtin.file:
        path: /opt/forex-ai-control-tower/dashboard-laravel
        state: directory
        owner: aiops
        group: aiops
        mode: "0750"

    - name: Copy Laravel dashboard app source
      ansible.builtin.copy:
        src: ../../control/dashboard-laravel/app/
        dest: /opt/forex-ai-control-tower/dashboard-laravel/app/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy Laravel dashboard config source
      ansible.builtin.copy:
        src: ../../control/dashboard-laravel/config/
        dest: /opt/forex-ai-control-tower/dashboard-laravel/config/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy Laravel dashboard bootstrap source
      ansible.builtin.copy:
        src: ../../control/dashboard-laravel/bootstrap/
        dest: /opt/forex-ai-control-tower/dashboard-laravel/bootstrap/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy Laravel dashboard database source
      ansible.builtin.copy:
        src: ../../control/dashboard-laravel/database/
        dest: /opt/forex-ai-control-tower/dashboard-laravel/database/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy Laravel dashboard public source
      ansible.builtin.copy:
        src: ../../control/dashboard-laravel/public/
        dest: /opt/forex-ai-control-tower/dashboard-laravel/public/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy Laravel dashboard resources source
      ansible.builtin.copy:
        src: ../../control/dashboard-laravel/resources/
        dest: /opt/forex-ai-control-tower/dashboard-laravel/resources/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy Laravel dashboard routes source
      ansible.builtin.copy:
        src: ../../control/dashboard-laravel/routes/
        dest: /opt/forex-ai-control-tower/dashboard-laravel/routes/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy Laravel dashboard project files
      ansible.builtin.copy:
        src: "../../control/dashboard-laravel/{{ item }}"
        dest: "/opt/forex-ai-control-tower/dashboard-laravel/{{ item }}"
        owner: aiops
        group: aiops
        mode: preserve
      loop:
        - artisan
        - composer.json
        - composer.lock
        - package.json
        - phpunit.xml
        - vite.config.js
        - README.md
        - .env.example

    - name: Create Laravel dashboard writable directories
      ansible.builtin.file:
        path: "/opt/forex-ai-control-tower/dashboard-laravel/{{ item }}"
        state: directory
        owner: aiops
        group: aiops
        mode: "0750"
      loop:
        - storage/app
        - storage/app/private
        - storage/app/public
        - storage/framework/cache/data
        - storage/framework/sessions
        - storage/framework/testing
        - storage/framework/views
        - storage/logs
        - bootstrap/cache

    - name: Install Laravel Composer dependencies
      ansible.builtin.command:
        cmd: composer install --no-dev --no-interaction --optimize-autoloader
        chdir: /opt/forex-ai-control-tower/dashboard-laravel
      environment:
        COMPOSER_ALLOW_SUPERUSER: "1"
      changed_when: false

    - name: Restore Laravel dashboard ownership after dependency install
      ansible.builtin.file:
        path: /opt/forex-ai-control-tower/dashboard-laravel
        state: directory
        owner: aiops
        group: aiops
        recurse: true

    - name: Install Laravel dashboard environment file
      ansible.builtin.copy:
        dest: /opt/forex-ai-control-tower/dashboard-laravel/.env
        owner: aiops
        group: aiops
        mode: "0640"
        content: |
          APP_NAME="Forex AI Control Tower"
          APP_ENV=production
          APP_KEY={{ lookup('env', 'LARAVEL_DASHBOARD_APP_KEY') }}
          APP_DEBUG=false
          APP_URL=http://10.10.1.81:5173
          APP_LOCALE=en
          APP_FALLBACK_LOCALE=en
          LOG_CHANNEL=stack
          LOG_LEVEL=info
          DB_CONNECTION=sqlite
          SESSION_DRIVER=file
          CACHE_STORE=file
          QUEUE_CONNECTION=sync
          CONTROL_TOWER_API_URL=http://10.10.1.81:8000
          CONTROL_TOWER_DOCS_URL=http://10.10.1.81:8000/docs
          CONTROL_TOWER_GRAFANA_URL=http://10.10.1.81:3000
      no_log: true

    - name: Install Laravel dashboard systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/forex-laravel-dashboard.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Forex AI Control Tower Laravel Operator Dashboard
          After=network-online.target forex-control-api.service
          Wants=network-online.target

          [Service]
          Type=simple
          User=aiops
          Group=aiops
          WorkingDirectory=/opt/forex-ai-control-tower/dashboard-laravel
          ExecStart=/usr/bin/php artisan serve --host=0.0.0.0 --port=5173
          Restart=always
          RestartSec=5
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Start and enable Laravel dashboard
      ansible.builtin.systemd_service:
        name: forex-laravel-dashboard
        state: restarted
        enabled: true
