---
- name: Deploy optional Laravel operator dashboard
  hosts: control
  become: true
  tasks:
    - name: Install PHP and Composer packages for Laravel dashboard
      ansible.builtin.apt:
        name:
          - php-cli
          - php-curl
          - php-mbstring
          - php-xml
          - php-zip
          - php-sqlite3
          - unzip
          - composer
        state: present
        update_cache: true

    - name: Create Laravel dashboard directory
      ansible.builtin.file:
        path: /opt/forex-ai-control-tower/dashboard-laravel
        state: directory
        owner: aiops
        group: aiops
        mode: "0750"

    - name: Copy Laravel dashboard source
      ansible.builtin.copy:
        src: ../../control/dashboard-laravel/
        dest: /opt/forex-ai-control-tower/dashboard-laravel/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Install Laravel Composer dependencies
      ansible.builtin.command:
        cmd: composer install --no-dev --no-interaction --optimize-autoloader
        chdir: /opt/forex-ai-control-tower/dashboard-laravel
      become_user: aiops
      changed_when: false

    - name: Install Laravel dashboard environment file
      ansible.builtin.copy:
        dest: /opt/forex-ai-control-tower/dashboard-laravel/.env
        owner: aiops
        group: aiops
        mode: "0640"
        content: |
          APP_NAME="Forex AI Control Tower"
          APP_ENV=production
          APP_KEY={{ lookup('env', 'LARAVEL_DASHBOARD_APP_KEY') }}
          APP_DEBUG=false
          APP_URL=http://10.10.1.81:8090
          APP_LOCALE=en
          APP_FALLBACK_LOCALE=en
          LOG_CHANNEL=stack
          LOG_LEVEL=info
          DB_CONNECTION=sqlite
          SESSION_DRIVER=file
          CACHE_STORE=file
          QUEUE_CONNECTION=sync
          CONTROL_TOWER_API_URL=http://10.10.1.81:8000
          CONTROL_TOWER_DOCS_URL=http://10.10.1.81:8000/docs
          CONTROL_TOWER_GRAFANA_URL=http://10.10.1.81:3000
      no_log: true

    - name: Install Laravel dashboard systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/forex-laravel-dashboard.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Forex AI Control Tower Laravel Operator Dashboard
          After=network-online.target forex-control-api.service
          Wants=network-online.target

          [Service]
          Type=simple
          User=aiops
          Group=aiops
          WorkingDirectory=/opt/forex-ai-control-tower/dashboard-laravel
          ExecStart=/usr/bin/php artisan serve --host=0.0.0.0 --port=8090
          Restart=always
          RestartSec=5
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Start and enable Laravel dashboard
      ansible.builtin.systemd_service:
        name: forex-laravel-dashboard
        state: restarted
        enabled: true
