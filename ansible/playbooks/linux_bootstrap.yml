---
- name: Phase 2 - Bootstrap Ubuntu nodes
  hosts: linux_nodes
  become: true
  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - git
          - python3
          - python3-venv
          - python3-pip
          - ufw
        update_cache: true
        state: present

    - name: Create aiops service user
      ansible.builtin.user:
        name: aiops
        system: true
        shell: /bin/bash
        create_home: true

    - name: Install Docker prerequisites
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present

    - name: Enable Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
