---
- name: Install Linux host metrics exporters
  hosts: linux_nodes
  become: true
  tasks:
    - name: Install Prometheus node exporter
      ansible.builtin.apt:
        name: prometheus-node-exporter
        update_cache: true
        state: present

    - name: Enable node exporter
      ansible.builtin.systemd_service:
        name: prometheus-node-exporter
        state: started
        enabled: true

- name: Install Windows host metrics exporter
  hosts: mt5_bridge_windows
  gather_facts: false
  tasks:
    - name: Install or update windows_exporter from latest GitHub release
      ansible.windows.win_shell: |
        $ErrorActionPreference = "Stop"
        $service = Get-Service -Name windows_exporter -ErrorAction SilentlyContinue
        if ($service) {
          if ($service.Status -ne "Running") { Start-Service windows_exporter }
          exit 0
        }

        $release = Invoke-RestMethod -Uri "https://api.github.com/repos/prometheus-community/windows_exporter/releases/latest" -UseBasicParsing
        $asset = $release.assets | Where-Object { $_.name -match 'amd64\.msi$' } | Select-Object -First 1
        if (-not $asset) { throw "No amd64 MSI asset found for windows_exporter latest release" }

        $installer = Join-Path $env:TEMP $asset.name
        Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $installer -UseBasicParsing
        Start-Process msiexec.exe -ArgumentList @("/i", $installer, "/qn", "ENABLED_COLLECTORS=cpu,logical_disk,net,os,service,system,memory") -Wait
        Remove-Item -LiteralPath $installer -Force -ErrorAction SilentlyContinue

    - name: Configure current windows_exporter collectors
      ansible.windows.win_shell: |
        $ErrorActionPreference = "Stop"
        $configPath = "C:\Program Files\windows_exporter\config.yaml"
        @"
        collectors:
          enabled: cpu,logical_disk,net,os,service,system,memory
        "@ | Set-Content -Path $configPath -Encoding ascii
        $binPath = '"C:\Program Files\windows_exporter\windows_exporter.exe" --config.file="C:\Program Files\windows_exporter\config.yaml"'
        Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Services\windows_exporter" -Name ImagePath -Value $binPath

    - name: Open firewall for windows_exporter
      ansible.windows.win_shell: |
        $ErrorActionPreference = "Stop"
        $rule = Get-NetFirewallRule -DisplayName "ForexAI windows_exporter 9182" -ErrorAction SilentlyContinue
        if (-not $rule) {
          New-NetFirewallRule -DisplayName "ForexAI windows_exporter 9182" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 9182 | Out-Null
        } else {
          Enable-NetFirewallRule -DisplayName "ForexAI windows_exporter 9182" | Out-Null
        }

    - name: Ensure windows_exporter service is running
      ansible.windows.win_service:
        name: windows_exporter
        state: started
        start_mode: auto
