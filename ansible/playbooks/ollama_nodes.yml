---
- name: Phase 5 - Ollama reasoning node
  hosts: llm_reason
  become: true
  tasks:
    - name: Install Ollama
      ansible.builtin.shell: curl -fsSL https://ollama.com/install.sh | sh
      args:
        creates: /usr/local/bin/ollama

    - name: Enable Ollama
      ansible.builtin.service:
        name: ollama
        state: started
        enabled: true

    - name: Create Ollama systemd override directory
      ansible.builtin.file:
        path: /etc/systemd/system/ollama.service.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Expose Ollama on fixed LAN port
      ansible.builtin.copy:
        dest: /etc/systemd/system/ollama.service.d/override.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          [Service]
          Environment="OLLAMA_HOST=0.0.0.0:11434"

    - name: Restart Ollama with LAN binding
      ansible.builtin.systemd_service:
        name: ollama
        state: restarted
        enabled: true
        daemon_reload: true

    - name: Pull reasoning models
      ansible.builtin.command: ollama pull {{ item }}
      loop:
        - qwen3:8b
        - qwen3:14b
        - llama3.1:8b
      changed_when: false

