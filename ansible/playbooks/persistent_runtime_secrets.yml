---
- name: Install reboot-persistent runtime secrets on Linux control node
  hosts: control
  become: true
  vars:
    credentials_file: "{{ credentials_file | default('secrets/control_tower_credentials.env') }}"
    runtime_env_path: /etc/forex-ai-control-tower/runtime.env
    control_runtime_keys:
      - POSTGRES_PASSWORD
      - GRAFANA_ADMIN_PASSWORD
      - JWT_SECRET_KEY
      - EXECUTION_GUARD_SIGNING_KEY
      - BRIDGE_API_TOKEN
      - TELEMETRY_INGEST_TOKEN
      - LOCAL_AUTH_BOOTSTRAP_ENABLED
      - LOCAL_ADMIN_BOOTSTRAP_PASSWORD
      - TOTP_ISSUER
      - RECOVERY_EMAIL
      - ALLOW_LIVE_TRADING
      - NEWS_PROVIDER_ENABLED
      - NEWS_PROVIDER_TYPE
      - NEWS_CALENDAR_FILE
      - NEWS_CALENDAR_URL
      - NEWS_PROVIDER_API_KEY
      - NEWS_HIGH_IMPACT_WINDOW_MINUTES
      - NEWS_STALE_AFTER_MINUTES
      - NEWS_CALENDAR_FROM
      - NEWS_CALENDAR_TO
      - TELEGRAM_BOT_TOKEN
      - TELEGRAM_ADMIN_CHAT_ID
      - WHATSAPP_TOKEN
      - WHATSAPP_PHONE_NUMBER_ID
      - SMTP_HOST
      - SMTP_PORT
      - SMTP_USER
      - SMTP_PASSWORD
      - SMTP_FROM
      - FCM_PROJECT_ID
      - FCM_SERVER_KEY
      - FCM_SERVICE_ACCOUNT_JSON
      - VAPID_PUBLIC_KEY
      - VAPID_PRIVATE_KEY
      - DISCORD_WEBHOOK_URL
      - SMS_PROVIDER_TOKEN
      - ALERTMANAGER_WEBHOOK_TOKEN
      - OPENAI_API_KEY
      - GEMINI_API_KEY
      - LLM_DAILY_BUDGET_USD
      - LLM_MONTHLY_BUDGET_USD
      - PAID_LLM_APPROVAL_REQUIRED
      - OPENCLAW_ENABLED
      - OPENCLAW_API_URL
      - OPENCLAW_API_TOKEN
  tasks:
    - name: Parse credential paste form
      ansible.builtin.set_fact:
        credential_map: "{{ credential_map | default({}) | combine({(item.split('=', 1)[0] | trim): (item.split('=', 1)[1] | trim)}) }}"
      loop: "{{ lookup('file', credentials_file).splitlines() }}"
      when:
        - item is match('^[A-Za-z_][A-Za-z0-9_]*=')
        - not item.split('=', 1)[1] | trim is match('^<.*>$')
        - item.split('=', 1)[1] | trim | length > 0
      no_log: true

    - name: Validate required control runtime keys
      ansible.builtin.assert:
        that:
          - credential_map.POSTGRES_PASSWORD is defined
          - credential_map.GRAFANA_ADMIN_PASSWORD is defined
          - credential_map.JWT_SECRET_KEY is defined
          - credential_map.EXECUTION_GUARD_SIGNING_KEY is defined
          - credential_map.BRIDGE_API_TOKEN is defined
          - credential_map.NEWS_PROVIDER_API_KEY is defined
        fail_msg: "Required runtime secrets are missing from the credential paste form."
      no_log: true

    - name: Create protected Linux secret directory
      ansible.builtin.file:
        path: /etc/forex-ai-control-tower
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Install protected control runtime environment file
      ansible.builtin.copy:
        dest: "{{ runtime_env_path }}"
        owner: root
        group: root
        mode: "0600"
        content: |
          # Managed by ansible/playbooks/persistent_runtime_secrets.yml
          {% for key in control_runtime_keys %}
          {% if credential_map.get(key, '') | length > 0 %}
          {{ key }}={{ credential_map[key] }}
          {% endif %}
          {% endfor %}
      no_log: true

    - name: Restart control runtime services with persistent secret file
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        state: restarted
        enabled: true
        daemon_reload: true
      loop:
        - forex-control-stack
        - forex-control-api
        - forex-agent-workflow
        - forex-orchestrator

- name: Install reboot-persistent runtime secrets on Linux worker nodes
  hosts: worker_nodes
  become: true
  vars:
    credentials_file: "{{ credentials_file | default('secrets/control_tower_credentials.env') }}"
    runtime_env_path: /etc/forex-ai-control-tower/runtime.env
    worker_runtime_keys:
      - BRIDGE_API_TOKEN
      - TELEMETRY_INGEST_TOKEN
  tasks:
    - name: Parse credential paste form
      ansible.builtin.set_fact:
        credential_map: "{{ credential_map | default({}) | combine({(item.split('=', 1)[0] | trim): (item.split('=', 1)[1] | trim)}) }}"
      loop: "{{ lookup('file', credentials_file).splitlines() }}"
      when:
        - item is match('^[A-Za-z_][A-Za-z0-9_]*=')
        - not item.split('=', 1)[1] | trim is match('^<.*>$')
        - item.split('=', 1)[1] | trim | length > 0
      no_log: true

    - name: Validate required worker runtime keys
      ansible.builtin.assert:
        that:
          - credential_map.BRIDGE_API_TOKEN is defined
        fail_msg: "BRIDGE_API_TOKEN is missing from the credential paste form."
      no_log: true

    - name: Create protected Linux secret directory
      ansible.builtin.file:
        path: /etc/forex-ai-control-tower
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Install protected worker runtime environment file
      ansible.builtin.copy:
        dest: "{{ runtime_env_path }}"
        owner: root
        group: root
        mode: "0600"
        content: |
          # Managed by ansible/playbooks/persistent_runtime_secrets.yml
          {% for key in worker_runtime_keys %}
          {% if credential_map.get(key, '') | length > 0 %}
          {{ key }}={{ credential_map[key] }}
          {% endif %}
          {% endfor %}
      no_log: true

    - name: Restart market worker with persistent secret file
      ansible.builtin.systemd_service:
        name: forex-market-worker
        state: restarted
        enabled: true
        daemon_reload: true
      when: "'market_worker' in group_names"

    - name: Restart strategy/risk worker with persistent secret file
      ansible.builtin.systemd_service:
        name: forex-strategy-risk-worker
        state: restarted
        enabled: true
        daemon_reload: true
      when: "'strategy_risk_worker' in group_names"

- name: Install reboot-persistent runtime secrets on Windows MT5 bridge
  hosts: mt5_bridge_windows
  gather_facts: false
  vars:
    credentials_file: "{{ credentials_file | default('secrets/control_tower_credentials.env') }}"
    windows_runtime_keys:
      - BRIDGE_API_TOKEN
      - EXECUTION_GUARD_SIGNING_KEY
      - BRIDGE_MODE
      - ALLOW_LIVE_TRADING
      - REQUIRE_ORDER_CHECK
      - MT5_DEFAULT_ACCOUNT_ID
      - MT5_DEFAULT_BRIDGE_PORT
      - MT5_ACCOUNT_PROFILES_FILE
  tasks:
    - name: Parse credential paste form
      ansible.builtin.set_fact:
        credential_map: "{{ credential_map | default({}) | combine({(item.split('=', 1)[0] | trim): (item.split('=', 1)[1] | trim)}) }}"
      loop: "{{ lookup('file', credentials_file).splitlines() }}"
      when:
        - item is match('^[A-Za-z_][A-Za-z0-9_]*=')
        - not item.split('=', 1)[1] | trim is match('^<.*>$')
        - item.split('=', 1)[1] | trim | length > 0
      no_log: true

    - name: Validate required Windows bridge runtime keys
      ansible.builtin.assert:
        that:
          - credential_map.BRIDGE_API_TOKEN is defined
          - credential_map.EXECUTION_GUARD_SIGNING_KEY is defined
        fail_msg: "Required Windows bridge runtime secrets are missing from the credential paste form."
      no_log: true

    - name: Set Windows machine-level bridge runtime environment
      ansible.windows.win_environment:
        state: present
        level: machine
        name: "{{ item }}"
        value: "{{ credential_map[item] }}"
      loop: "{{ windows_runtime_keys }}"
      when: credential_map.get(item, '') | length > 0
      no_log: true

    - name: Restart MT5 bridge task with persistent machine environment
      ansible.windows.win_shell: |
        $ErrorActionPreference = "Stop"
        Stop-ScheduledTask -TaskName "ForexAI-MT5-Bridge" -ErrorAction SilentlyContinue
        Get-NetTCPConnection -LocalPort 8501 -State Listen -ErrorAction SilentlyContinue | ForEach-Object {
          Stop-Process -Id $_.OwningProcess -Force -ErrorAction SilentlyContinue
        }
        Start-ScheduledTask -TaskName "ForexAI-MT5-Bridge"
        Start-Sleep -Seconds 8
        (Invoke-WebRequest -Uri "http://127.0.0.1:8501/health" -UseBasicParsing -TimeoutSec 10).StatusCode
