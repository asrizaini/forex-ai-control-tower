---
- name: Reset local admin login credential
  hosts: control
  become: true
  tasks:
    - name: Reset admin password in control database
      ansible.builtin.shell: |
        set -euo pipefail
        cd /opt/forex-ai-control-tower/app
        /opt/forex-ai-control-tower/.venv/bin/python - <<'PY'
        from control.api.db import init_db, SessionLocal
        from control.api.models import User, UserCredential
        from control.api.security import password_hash
        import os

        admin_password = os.environ["ADMIN_PASSWORD"]
        init_db()
        db = SessionLocal()
        try:
            user = db.query(User).filter_by(user_id="admin").one_or_none()
            if user is None:
                user = User(
                    user_id="admin",
                    email="m.asri.kamaruddin@gmail.com",
                    role="super_admin",
                    language="en",
                    enabled=True,
                    onboarding_complete=True,
                )
                db.add(user)
            else:
                user.email = "m.asri.kamaruddin@gmail.com"
                user.role = "super_admin"
                user.enabled = True
                user.onboarding_complete = True

            digest, salt = password_hash(admin_password)
            credential = db.query(UserCredential).filter_by(user_id="admin").one_or_none()
            if credential is None:
                credential = UserCredential(user_id="admin", password_hash=digest, password_salt=salt)
                db.add(credential)
            else:
                credential.password_hash = digest
                credential.password_salt = salt
                credential.failed_login_count = 0
                credential.two_factor_enabled = False
                credential.totp_secret_encrypted = None
            db.commit()
        finally:
            db.close()
        PY
      args:
        executable: /bin/bash
      environment:
        POSTGRES_PASSWORD: "{{ lookup('env', 'POSTGRES_PASSWORD') }}"
        ADMIN_PASSWORD: "{{ lookup('env', 'ADMIN_PASSWORD') }}"
      no_log: true
