---
- name: Rotate initialized runtime secrets on control node
  hosts: control
  become: true
  vars:
    postgres_container: forex-ai-control-tower-postgres-1
    grafana_container: forex-ai-control-tower-grafana-1
  tasks:
    - name: Ensure required rotation secrets are present on controller
      ansible.builtin.assert:
        that:
          - lookup('env', 'POSTGRES_PASSWORD') | length >= 32
          - lookup('env', 'GRAFANA_ADMIN_PASSWORD') | length >= 32
          - lookup('env', 'JWT_SECRET_KEY') | length >= 32
        fail_msg: Required control-node runtime secrets are missing or too short.
      no_log: true

    - name: Rotate PostgreSQL application user password
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - -i
          - "{{ postgres_container }}"
          - psql
          - -U
          - forex_ai
          - -d
          - forex_ai
          - -v
          - ON_ERROR_STOP=1
      args:
        stdin: |
          ALTER USER forex_ai WITH PASSWORD '{{ lookup("env", "POSTGRES_PASSWORD") | replace("'", "''") }}';
      changed_when: true
      no_log: true

    - name: Rotate Grafana admin password
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - -i
          - "{{ grafana_container }}"
          - sh
          - -lc
          - 'IFS= read -r GRAFANA_NEW_PASSWORD; /usr/share/grafana/bin/grafana cli --homepath /usr/share/grafana --config /etc/grafana/grafana.ini admin reset-admin-password "$GRAFANA_NEW_PASSWORD" >/dev/null'
      args:
        stdin: "{{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') }}"
      changed_when: true
      no_log: true

    - name: Set volatile systemd runtime secrets for control node
      ansible.builtin.command:
        argv:
          - systemctl
          - set-environment
          - "POSTGRES_PASSWORD={{ lookup('env', 'POSTGRES_PASSWORD') }}"
          - "GRAFANA_ADMIN_PASSWORD={{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') }}"
          - "JWT_SECRET_KEY={{ lookup('env', 'JWT_SECRET_KEY') }}"
      changed_when: true
      no_log: true

    - name: Restart control API with rotated JWT secret
      ansible.builtin.systemd_service:
        name: forex-control-api
        state: restarted
        enabled: true

    - name: Restart control stack after rotation
      ansible.builtin.systemd_service:
        name: forex-control-stack
        state: restarted
        enabled: true

- name: Rotate Windows MT5 bridge runtime secrets
  hosts: mt5_bridge_windows
  gather_facts: false
  tasks:
    - name: Ensure required bridge secrets are present on controller
      ansible.builtin.assert:
        that:
          - lookup('env', 'BRIDGE_API_TOKEN') | length >= 32
          - lookup('env', 'EXECUTION_GUARD_SIGNING_KEY') | length >= 32
        fail_msg: Required bridge runtime secrets are missing or too short.
      no_log: true

    - name: Set MT5 bridge machine environment secrets
      ansible.windows.win_environment:
        state: present
        level: machine
        name: "{{ item.name }}"
        value: "{{ item.value }}"
      loop:
        - name: BRIDGE_API_TOKEN
          value: "{{ lookup('env', 'BRIDGE_API_TOKEN') }}"
        - name: EXECUTION_GUARD_SIGNING_KEY
          value: "{{ lookup('env', 'EXECUTION_GUARD_SIGNING_KEY') }}"
      no_log: true

    - name: Restart MT5 bridge scheduled task
      ansible.windows.win_shell: |
        $ErrorActionPreference = "Stop"
        Stop-ScheduledTask -TaskName "ForexAI-MT5-Bridge" -ErrorAction SilentlyContinue
        Get-Process python -ErrorAction SilentlyContinue | Where-Object { $_.Path -like "C:\ForexAI\*" } | Stop-Process -Force -ErrorAction SilentlyContinue
        Start-ScheduledTask -TaskName "ForexAI-MT5-Bridge"
        Start-Sleep -Seconds 8
        (Invoke-WebRequest -Uri "http://127.0.0.1:8501/health" -UseBasicParsing -TimeoutSec 10).StatusCode
