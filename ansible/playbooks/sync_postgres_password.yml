---
- name: Sync PostgreSQL application role password with runtime environment
  hosts: control
  become: true
  tasks:
    - name: Update forex_ai database role password from controller environment
      ansible.builtin.shell: |
        docker exec -i -u postgres -e APP_DB_PASSWORD forex-ai-control-tower-postgres-1 bash -s <<'SCRIPT'
        set -euo pipefail
        escaped=${APP_DB_PASSWORD//\'/\'\'}
        psql -U forex_ai -d postgres -c "ALTER USER forex_ai WITH PASSWORD '$escaped';"
        SCRIPT
      environment:
        APP_DB_PASSWORD: "{{ lookup('env', 'POSTGRES_PASSWORD') }}"
      no_log: true
      changed_when: true

    - name: Restart control API after database password sync
      ansible.builtin.systemd_service:
        name: forex-control-api
        state: restarted
        enabled: true

    - name: Restart agent workflow engine after database password sync
      ansible.builtin.systemd_service:
        name: forex-agent-workflow
        state: restarted
        enabled: true
