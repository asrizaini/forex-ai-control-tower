---
- name: Install Windows startup task for MT5 bridge
  hosts: mt5_bridge_windows
  gather_facts: false
  tasks:
    - name: Create startup task for MT5 bridge
      ansible.windows.win_shell: |
        $ErrorActionPreference = "Stop"
        $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-ExecutionPolicy Bypass -File C:\ForexAI\mt5_bridge\run_bridge.ps1" -WorkingDirectory "C:\ForexAI\mt5_bridge"
        $trigger = New-ScheduledTaskTrigger -AtStartup
        $principal = New-ScheduledTaskPrincipal -UserId "SYSTEM" -LogonType ServiceAccount -RunLevel Highest
        $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -RestartCount 3 -RestartInterval (New-TimeSpan -Minutes 1)
        Register-ScheduledTask -TaskName "ForexAI-MT5-Bridge" -Action $action -Trigger $trigger -Principal $principal -Settings $settings -Force | Out-Null

    - name: Ensure MT5 bridge task is running
      ansible.windows.win_shell: |
        $ErrorActionPreference = "Stop"
        Start-ScheduledTask -TaskName "ForexAI-MT5-Bridge"
        Start-Sleep -Seconds 5
        (Invoke-WebRequest -Uri "http://127.0.0.1:8501/health" -UseBasicParsing -TimeoutSec 10).Content
