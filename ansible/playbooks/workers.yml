---
- name: Phase 6 - Worker nodes
  hosts: worker_nodes
  become: true
  tasks:
    - name: Create worker directory
      ansible.builtin.file:
        path: /opt/forex-ai-control-tower/workers
        state: directory
        owner: aiops
        group: aiops
        mode: "0750"

    - name: Copy worker package
      ansible.builtin.copy:
        src: ../../workers/
        dest: /opt/forex-ai-control-tower/workers/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Copy Agent Theater package for worker dialogue templates
      ansible.builtin.copy:
        src: ../../agent_theater/
        dest: /opt/forex-ai-control-tower/agent_theater/
        owner: aiops
        group: aiops
        mode: preserve

    - name: Write worker role marker
      ansible.builtin.copy:
        dest: /opt/forex-ai-control-tower/workers/role.txt
        content: "{{ group_names | join(',') }}\n"
        owner: aiops
        group: aiops
        mode: "0640"

    - name: Install market worker systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/forex-market-worker.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Forex AI Market Worker
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=aiops
          Group=aiops
          WorkingDirectory=/opt/forex-ai-control-tower
          Environment=PYTHONPATH=/opt/forex-ai-control-tower
          Environment=FOREX_WORKER_NAME=market
          Environment=MT5_BRIDGE_URL=http://10.10.1.86:8501
          Environment=TELEMETRY_INGEST_URL=http://10.10.1.81:8000/api/v1/telemetry/worker-snapshot
          Environment=MARKET_WATCH_SYMBOLS=EURUSD,XAUUSD,GBPUSD,USDJPY
          PassEnvironment=BRIDGE_API_TOKEN TELEMETRY_INGEST_TOKEN
          ExecStart=/usr/bin/python3 -m workers.runner
          Restart=always
          RestartSec=5
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target
      when: "'market_worker' in group_names"

    - name: Install strategy/risk worker systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/forex-strategy-risk-worker.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Forex AI Strategy and Risk Worker
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=aiops
          Group=aiops
          WorkingDirectory=/opt/forex-ai-control-tower
          Environment=PYTHONPATH=/opt/forex-ai-control-tower
          Environment=FOREX_WORKER_NAME=strategy_risk
          Environment=MT5_BRIDGE_URL=http://10.10.1.86:8501
          Environment=TELEMETRY_INGEST_URL=http://10.10.1.81:8000/api/v1/telemetry/worker-snapshot
          PassEnvironment=BRIDGE_API_TOKEN TELEMETRY_INGEST_TOKEN
          ExecStart=/usr/bin/python3 -m workers.runner
          Restart=always
          RestartSec=5
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target
      when: "'strategy_risk_worker' in group_names"

    - name: Reload systemd for worker services
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Start and enable market worker
      ansible.builtin.systemd_service:
        name: forex-market-worker
        state: restarted
        enabled: true
      when: "'market_worker' in group_names"

    - name: Start and enable strategy/risk worker
      ansible.builtin.systemd_service:
        name: forex-strategy-risk-worker
        state: restarted
        enabled: true
      when: "'strategy_risk_worker' in group_names"
