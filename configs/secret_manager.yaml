default_provider: env
providers:
  env:
    enabled: true
    description: Runtime environment variables supplied by controller or systemd.
  vault:
    enabled: false
    address_env: VAULT_ADDR
    token_env: VAULT_TOKEN
    path_prefix: secret/data/forex-ai-control-tower
  sops:
    enabled: false
    encrypted_file: secrets/forex-ai-control-tower.enc.yaml
    age_key_env: SOPS_AGE_KEY
  cloud:
    enabled: false
    provider_env: CLOUD_SECRET_PROVIDER
    prefix: forex-ai-control-tower
required_runtime_secrets:
  - POSTGRES_PASSWORD
  - GRAFANA_ADMIN_PASSWORD
  - JWT_SECRET_KEY
  - EXECUTION_GUARD_SIGNING_KEY
  - BRIDGE_API_TOKEN
