services:
  controller:
    build:
      context: ..
      dockerfile: docker/controller-runner.Dockerfile
    working_dir: /workspace
    volumes:
      - ..:/workspace
    environment:
      GITHUB_OWNER: ${GITHUB_OWNER:-}
      GITHUB_REPO: ${GITHUB_REPO:-forex-ai-control-tower}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      LINUX_STANDARD_SSH_PASSWORD: ${LINUX_STANDARD_SSH_PASSWORD:-}
      LINUX_STANDARD_SUDO_PASSWORD: ${LINUX_STANDARD_SUDO_PASSWORD:-}
      WINDOWS_MT5_USER: ${WINDOWS_MT5_USER:-}
      WINDOWS_MT5_PASSWORD: ${WINDOWS_MT5_PASSWORD:-}
      WINDOWS_MT5_SSH_PASSWORD: ${WINDOWS_MT5_SSH_PASSWORD:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      GRAFANA_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      EXECUTION_GUARD_SIGNING_KEY: ${EXECUTION_GUARD_SIGNING_KEY:-}
      BRIDGE_API_TOKEN: ${BRIDGE_API_TOKEN:-}
      TELEMETRY_INGEST_TOKEN: ${TELEMETRY_INGEST_TOKEN:-}
      LOCAL_AUTH_BOOTSTRAP_ENABLED: ${LOCAL_AUTH_BOOTSTRAP_ENABLED:-}
      LOCAL_ADMIN_BOOTSTRAP_PASSWORD: ${LOCAL_ADMIN_BOOTSTRAP_PASSWORD:-}
      TOTP_ISSUER: ${TOTP_ISSUER:-Forex AI Control Tower}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
