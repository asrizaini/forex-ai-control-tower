global:
  resolve_timeout: 5m

route:
  receiver: control-api-notification-hub
  group_by: ["alertname", "instance"]
  group_wait: 15s
  group_interval: 2m
  repeat_interval: 1h

receivers:
  - name: control-api-notification-hub
    webhook_configs:
      - url: http://10.10.1.81:8000/api/v1/notifications/monitoring/webhook
        send_resolved: true
