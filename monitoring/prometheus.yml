global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: control-api
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets: ["qdrant:6333"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets: ["loki:3100"]

  - job_name: linux-node
    static_configs:
      - targets:
          - 10.10.1.81:9100
          - 10.10.1.82:9100
          - 10.10.1.83:9100
          - 10.10.1.84:9100
          - 10.10.1.85:9100

  - job_name: windows-node
    static_configs:
      - targets:
          - 10.10.1.86:9182

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://host.docker.internal:8000/health
          - http://host.docker.internal:5173/
          - http://grafana:3000/api/health
          - http://alertmanager:9093/-/healthy
          - http://prometheus:9090/-/healthy
          - http://qdrant:6333/
          - http://cadvisor:8080/healthz
          - http://loki:3100/ready
          - http://10.10.1.82:11434/api/tags
          - http://10.10.1.83:11434/api/tags
          - http://10.10.1.86:8501/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  - job_name: blackbox-tcp
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          # Do not probe fx-control SSH from the local Docker blackbox container.
          # Docker-to-host SSH hairpin checks can time out even while SSH is healthy
          # and reachable from the controller. fx-control SSH is covered by
          # deployment preflight and systemd service checks instead.
          - 10.10.1.82:22
          - 10.10.1.83:22
          - 10.10.1.84:22
          - 10.10.1.85:22
          - 10.10.1.86:22
          - 10.10.1.86:5985
          - 10.10.1.81:9100
          - 10.10.1.82:9100
          - 10.10.1.83:9100
          - 10.10.1.84:9100
          - 10.10.1.85:9100
          - 10.10.1.86:9182
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
