global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: control-api
    static_configs:
      - targets: ["10.10.1.81:8000"]

  - job_name: grafana
    static_configs:
      - targets: ["10.10.1.81:3000"]

  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets: ["10.10.1.81:6333"]

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets: ["10.10.1.81:3100"]

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://10.10.1.81:8000/health
          - http://10.10.1.81:5173/
          - http://10.10.1.81:3000/api/health
          - http://10.10.1.81:9090/-/healthy
          - http://10.10.1.81:6333/
          - http://10.10.1.81:3100/ready
          - http://10.10.1.82:11434/api/tags
          - http://10.10.1.83:11434/api/tags
          - http://10.10.1.86:8501/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  - job_name: blackbox-tcp
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - 10.10.1.81:22
          - 10.10.1.82:22
          - 10.10.1.83:22
          - 10.10.1.84:22
          - 10.10.1.85:22
          - 10.10.1.86:22
          - 10.10.1.86:5985
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
